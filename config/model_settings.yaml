    provider: "z-ai"
    strengths: ["cjk"]
    reasoning_model: true
    is_active: true
    status: "experimental"
    notes: "Reasoning model — 'content' field is EMPTY; answer is in 'reasoning' field. Hits finish_reason=length during chain-of-thought (7,414 tokens, 134.7s). Web UI works fine; OpenRouter API requires reasoning-field fallback."

  "z-ai/glm-5":
    name: "GLM-5"
    provider: "z-ai"
    strengths: ["cjk"]
    reasoning_model: true
    is_active: false  # Disabled due to token loop issue
    status: "experimental"
    notes: "Reasoning model — 'content' field EMPTY; reasoning field populated. KNOWN BUG: token loop on structured tasks (208K tokens observed). Apply max_tokens ≤ 10000. Web UI works; API requires reasoning fallback."

  "z-ai/glm-4.6":
    name: "GLM-4.6"
    provider: "z-ai"
    strengths: ["cjk"]
    reasoning_model: false
    is_active: false  # Disabled due to JSON parse issues
    status: "deprecated"
    notes: "JSON parse failure — embeds raw ASCII control characters in response body. 3-pass recovery in openrouter.py helps partially but model is unreliable."

