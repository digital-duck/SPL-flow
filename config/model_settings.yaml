# SPL-Flow Model Settings Configuration
# This file serves as the single source of truth for all model configurations.
#
# Schema for each model:
#   name: Human-readable display name
#   provider: Organization that trains the model
#   strengths: List of task types (cjk, code, eu_lang, math, reasoning, synthesis, general, speed, long-form, multimodal)
#   reasoning_model: true if response is in "reasoning" field, false if in "content" field
#   is_active: true to include in Model Zoo and auto-routing, false to hide
#   status: stable | experimental | deprecated | blocked
#   notes: Additional information about behavior, limitations, or usage tips

# ══════════════════════════════════════════════════════════════════════════════
